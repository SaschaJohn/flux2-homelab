---
# Self-manages the flux-operator installation and keeps it up to date
# by tracking the "latest" tag of the official OCI manifests artifact.
apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: flux-operator
  namespace: flux-system
  annotations:
    fluxcd.controlplane.io/reconcileTimeout: 5m
  labels:
    app.kubernetes.io/instance: flux-operator
    app.kubernetes.io/name: flux-operator
spec:
  inputs:
    - url: oci://ghcr.io/controlplaneio-fluxcd/flux-operator-manifests
      interval: 1h
  resources:
    - apiVersion: source.toolkit.fluxcd.io/v1
      kind: OCIRepository
      metadata:
        name: << inputs.provider.name >>
        namespace: << inputs.provider.namespace >>
      spec:
        interval: << inputs.interval | quote >>
        ref:
          tag: latest
        url: << inputs.url | quote >>
    - apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: << inputs.provider.name >>
        namespace: << inputs.provider.namespace >>
      spec:
        commonMetadata:
          labels:
            app.kubernetes.io/instance: flux-operator
            app.kubernetes.io/name: flux-operator
        deletionPolicy: Orphan
        force: true
        interval: 24h
        patches:
          - patch: |-
              - op: replace
                path: "/spec/selector/matchLabels"
                value:
                  app.kubernetes.io/name: flux-operator
                  app.kubernetes.io/instance: flux-operator
              - op: replace
                path: "/spec/template/metadata/labels"
                value:
                  app.kubernetes.io/name: flux-operator
                  app.kubernetes.io/instance: flux-operator
              - op: add
                path: "/spec/template/spec/containers/0/env/-"
                value:
                  name: REPORTING_INTERVAL
                  value: "30s"
            target:
              kind: Deployment
        path: ./flux-operator
        prune: true
        retryInterval: 5m
        serviceAccountName: << inputs.provider.name >>
        sourceRef:
          kind: OCIRepository
          name: << inputs.provider.name >>
        timeout: 5m
        wait: true
  wait: true
