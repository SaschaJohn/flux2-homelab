---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headplane
spec:
  parentRefs:
    - name: main-gateway
      namespace: kgateway-system
      sectionName: https
  hostnames:
    - headplane.lab.mnm-solutions.de
  rules:
    # Headplane's own router only serves paths under /admin; redirect the
    # bare root path there so the hostname works without a manual /admin
    # suffix. Exact-path matches take precedence over PathPrefix matches
    # per the Gateway API spec, so this fires before the catch-all below.
    - matches:
        - path:
            type: Exact
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /admin
            statusCode: 302
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: headplane
          port: 3000
