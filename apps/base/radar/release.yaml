apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radar
  namespace: radar
spec:
  interval: 50m
  releaseName: radar
  chart:
    spec:
      chart: ./deploy/helm/radar
      sourceRef:
        kind: GitRepository
        name: radar
  install:
    strategy:
      name: RetryOnFailure
  upgrade:
    strategy:
      name: RetryOnFailure
  # Default values
  # https://github.com/skyhook-io/radar/blob/main/deploy/helm/radar/values.yaml
  values:
    # Chart's pinned appVersion (1.7.6) predates the chart's main-branch
    # deployment template, which already passes -listen-address (added in
    # app release v1.8.5). Override until Chart.yaml's appVersion catches up.
    image:
      tag: "1.8.5"
