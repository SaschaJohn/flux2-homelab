apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radar
  namespace: radar
spec:
  interval: 50m
  releaseName: radar
  chart:
    spec:
      chart: ./deploy/helm/radar
      sourceRef:
        kind: GitRepository
        name: radar
  install:
    strategy:
      name: RetryOnFailure
  upgrade:
    strategy:
      name: RetryOnFailure
  # Default values
  # https://github.com/skyhook-io/radar/blob/main/deploy/helm/radar/values.yaml
  values: {}
