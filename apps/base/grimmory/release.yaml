apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grimmory
  namespace: grimmory
spec:
  interval: 50m
  releaseName: grimmory
  chart:
    spec:
      chart: ./deploy/helm/grimmory
      sourceRef:
        kind: GitRepository
        name: grimmory
  install:
    strategy:
      name: RetryOnFailure
  upgrade:
    strategy:
      name: RetryOnFailure
  # Default values
  # https://github.com/grimmory-tools/grimmory/blob/develop/deploy/helm/grimmory/values.yaml
  values: {}
