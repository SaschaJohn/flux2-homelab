apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grimmory
  namespace: grimmory
spec:
  interval: 50m
  releaseName: grimmory
  chart:
    spec:
      chart: ./deploy/helm/grimmory
      sourceRef:
        kind: GitRepository
        name: grimmory
  install:
    strategy:
      name: RetryOnFailure
  upgrade:
    strategy:
      name: RetryOnFailure
  # Default values
  # https://github.com/grimmory-tools/grimmory/blob/develop/deploy/helm/grimmory/values.yaml
  values:
    # Homelab Longhorn capacity is limited: use a single-replica storage
    # class for grimmory's data instead of the cluster-default 2 replicas.
    # PVCs are pre-created in pvc.yaml and referenced here as existingClaim.
    mariadb:
      persistence:
        storageClass: longhorn-single-replica
    persistence:
      dataVolume:
        existingClaim: grimmory-data
      booksVolume:
        existingClaim: grimmory-books
