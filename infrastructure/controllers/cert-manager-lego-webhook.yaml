---
apiVersion: v1
kind: Namespace
metadata:
  name: tooling
  labels:
    toolkit.fluxcd.io/tenant: sre-team
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cert-manager-lego-webhook
  namespace: tooling
spec:
  interval: 12h
  url: https://yxwuxuanl.github.io/cert-manager-lego-webhook
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager-lego-webhook
  namespace: tooling
spec:
  interval: 12h
  chart:
    spec:
      chart: cert-manager-lego-webhook 
      version: "1.4.0"
      sourceRef:
        kind: HelmRepository
        name: cert-manager-lego-webhook
  install:
    strategy:
      name: RetryOnFailure
    crds: CreateReplace
  upgrade:
    strategy:
      name: RetryOnFailure
    crds: CreateReplace
  values:
    certManager:
      namespace: cert-manager
      serviceAccount:
        name: cert-manager
