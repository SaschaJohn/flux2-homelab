---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cilium
  namespace: kube-system
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  interval: 24h
  url: https://helm.cilium.io/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  interval: 12h
  chart:
    spec:
      chart: cilium
      version: "1.19.3"
      sourceRef:
        kind: HelmRepository
        name: cilium
  install:
    strategy:
      name: RetryOnFailure
    crds: CreateReplace
  upgrade:
    strategy:
      name: RetryOnFailure
    crds: CreateReplace
  values:
    cgroup:
      autoMount:
        enabled: false
      hostRoot: /sys/fs/cgroup
    externalIPs:
      enabled: true
    ipam:
      mode: kubernetes
    k8sServiceHost: localhost
    k8sServicePort: 7445
    l2announcements:
      enabled: true
    securityContext:
      privileged: true
