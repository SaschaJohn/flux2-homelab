---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: cilium
  namespace: kube-system
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  interval: 24h
  url: oci://quay.io/cilium-charts/cilium
  layerSelector:
    mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
    operation: copy
  ref:
    tag: "1.19.3"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  interval: 12h
  install:
    strategy:
      name: RetryOnFailure
    crds: CreateReplace
  upgrade:
    strategy:
      name: RetryOnFailure
    crds: CreateReplace
  chartRef:
    kind: OCIRepository
    name: cilium
  values:
    cgroup:
      autoMount:
        enabled: false
      hostRoot: /sys/fs/cgroup
    externalIPs:
      enabled: true
    ipam:
      mode: kubernetes
    k8sServiceHost: localhost
    k8sServicePort: 7445
    l2announcements:
      enabled: true
    securityContext:
      privileged: true
