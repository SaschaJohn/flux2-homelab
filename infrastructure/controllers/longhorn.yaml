---
apiVersion: v1
kind: Namespace
metadata:
  name: longhorn-system
  labels:
    toolkit.fluxcd.io/tenant: sre-team
    pod-security.kubernetes.io/enforce: privileged
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: longhorn
  namespace: longhorn-system
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  interval: 24h
  url: https://charts.longhorn.io
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  interval: 12h
  chart:
    spec:
      chart: longhorn
      version: "1.11.3"
      sourceRef:
        kind: HelmRepository
        name: longhorn
  install:
    strategy:
      name: RetryOnFailure
    crds: CreateReplace
  upgrade:
    strategy:
      name: RetryOnFailure
    crds: CreateReplace
    disableHooks: true
  values:
    defaultSettings:
      defaultDataLocality: best-effort
      defaultReplicaCount: 2
      # Propagate the control-plane toleration to ALL Longhorn system-managed
      # components (engine-image, csi plugin, etc.), not just longhornDriver
      # and longhornManager below. Without this, engine-image never runs on
      # the control-plane node, so its disk space can't be used for replicas.
      taintToleration: node-role.kubernetes.io/control-plane:NoSchedule
    longhornDriver:
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
          operator: Exists
    longhornManager:
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
          operator: Exists
    persistence:
      defaultClassReplicaCount: 2
  # The longhorn-frontend Service has no appProtocol set by the chart (no
  # values.yaml option exposes it), which breaks WebSocket upgrades
  # (/v1/ws/... events stream) when proxied through kgateway/Envoy - Envoy
  # returns 403 on Connection:Upgrade requests unless the backend Service
  # port declares appProtocol: kubernetes.io/ws.
  postRenderers:
    - kustomize:
        patches:
          - patch: |
              - op: add
                path: /spec/ports/0/appProtocol
                value: kubernetes.io/ws
            target:
              kind: Service
              name: longhorn-frontend
