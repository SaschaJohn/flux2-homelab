---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kgateway-tls
  namespace: kgateway-system
spec:
  secretName: kgateway-tls
  duration: 8760h # 1 year
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
  dnsNames:
    - "*.sslip.io"
    - "kgateway.local"
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lab-mnm-solutions.de
  namespace: kgateway-system
spec:
  issuerRef:
    name: dode
    kind: ClusterIssuer
  secretName: lab.mnm-solutions-tls
  commonName: lab.mnm-solutions.de
  dnsNames:
    - lab.mnm-solutions.de
    - '*.lab.mnm-solutions.de'
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main-gateway
  namespace: kgateway-system
spec:
  gatewayClassName: kgateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.lab.mnm-solutions.de"
      tls:
        mode: Terminate
        certificateRefs:
          - name: lab.mnm-solutions-tls
            kind: Secret
      allowedRoutes:
        namespaces:
          from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-to-https
  namespace: kgateway-system
spec:
  parentRefs:
    - name: main-gateway
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1
kind: ReferenceGrant
metadata:
  name: allow-kgateway
  namespace: longhorn-system
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: kgateway-system
  to:
    - group: ""
      kind: Service
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: longhorn
  namespace: kgateway-system
spec:
  parentRefs:
    - name: main-gateway
      sectionName: https
  rules:
    - matches:
        - path:
            type: Exact
            value: /longhorn
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /longhorn/
            statusCode: 301
    - matches:
        - path:
            type: PathPrefix
            value: /longhorn/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: longhorn-frontend
          namespace: longhorn-system
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /v1
      backendRefs:
        - name: longhorn-frontend
          namespace: longhorn-system
          port: 80
